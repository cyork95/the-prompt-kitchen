name: Weekly Link Check

on:
  schedule:
    # Every Monday at 9am UTC
    - cron: '0 9 * * 1'
  workflow_dispatch:
    inputs:
      fail_on_error:
        description: 'Fail the workflow if broken links found'
        required: false
        default: 'false'
        type: boolean

jobs:
  link-check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Lychee link checker
        id: lychee
        uses: lycheeverse/lychee-action@v2
        with:
          args: |
            --verbose
            --no-progress
            --exclude-loopback
            --exclude 'mailto:'
            --exclude 'localhost'
            --exclude 'example\.com'
            --exclude 'character\.ai'
            --exclude 'chatglm\.cn'
            --exclude 'yiyan\.baidu\.com'
            --exclude 'kimi\.moonshot\.cn'
            --exclude 'studio\.ai21\.com'
            --exclude 'hailuo\.ai'
            --exclude 'pi\.ai'
            --timeout 20
            --retry-wait-time 2
            --max-retries 2
            './**/*.html'
          fail: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create or update issue for broken links
        if: steps.lychee.outputs.exit_code != 0
        uses: peter-evans/create-issue-from-file@v5
        with:
          title: '🔗 Broken links found — weekly check ${{ github.run_number }}'
          content-filepath: ./lychee/out.md
          labels: |
            maintenance
            broken-links

      - name: Report clean result
        if: steps.lychee.outputs.exit_code == 0
        run: echo "✅ All links are healthy."
